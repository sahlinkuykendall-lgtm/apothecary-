<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Apothecary Codex</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14100C">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --wall: #14100C;
  --wood-dark: #2A1D12;
  --wood-mid: #3E2B1A;
  --wood-light: #59402A;
  --gold: #C9A227;
  --gold-dim: #8A7433;
  --parchment: #E9DFC6;
  --parchment-deep: #D8C9A6;
  --ink: #2E2418;
  --ink-soft: #5A4A34;
  --oxblood: #8C3030;
  --moss: #5E6A3C;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'Crimson Pro', Georgia, serif;
  background: var(--wall);
  color: var(--parchment);
  font-size:17px; line-height:1.5;
  user-select:none; -webkit-user-select:none;
}
.scene { position:fixed; inset:0; display:none; }
.scene.active { display:block; }

/* ---------- SPLASH ---------- */
#splash {
  background: radial-gradient(ellipse at 50% 35%, #241A10, var(--wall) 75%);
  display:none; align-items:center; justify-content:center; flex-direction:column;
  text-align:center; z-index:100;
}
#splash.active { display:flex; }
.splash-sigil { font-size:56px; color:var(--gold); opacity:0; animation: rise 1.1s ease .2s forwards; }
.splash-title {
  font-family:'IM Fell English', serif; font-size:34px; color:var(--gold);
  margin-top:8px; opacity:0; animation: rise 1.1s ease .55s forwards;
}
.splash-sub {
  font-style:italic; color:#9A8A66; margin-top:6px; font-size:15px;
  opacity:0; animation: rise 1.1s ease .9s forwards;
}
@keyframes rise { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
#splash.leaving { animation: fadeout .6s ease forwards; }
@keyframes fadeout { to { opacity:0; } }

/* ---------- SHELF ---------- */
#shelf {
  background:
    linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.45)),
    repeating-linear-gradient(90deg, #1B140D 0 3px, #201810 3px 90px);
  overflow-y:auto; overflow-x:hidden;
  padding: calc(10px + env(safe-area-inset-top)) 0 calc(20px + env(safe-area-inset-bottom));
}
.shelf-head { text-align:center; padding: 6px 16px 2px; }
.shelf-head h1 { font-family:'IM Fell English',serif; font-weight:400; font-size:26px; color:var(--gold); }
.shelf-head .sub { font-style:italic; color:#9A8A66; font-size:13.5px; margin-top:-2px; }
.shelf-tools { display:flex; gap:8px; padding: 10px 16px 4px; }
.shelf-tools input {
  flex:1; font-family:inherit; font-size:16px; color:var(--parchment);
  background:rgba(0,0,0,.35); border:1px solid rgba(201,162,39,.35); border-radius:3px;
  padding: 9px 12px;
}
.shelf-tools input::placeholder { color:#7A6C50; font-style:italic; }
.tool-btn {
  width:42px; min-width:42px; background:rgba(0,0,0,.35);
  border:1px solid rgba(201,162,39,.35); border-radius:3px;
  color:var(--gold); font-size:18px; cursor:pointer;
}
#searchResults { padding: 0 16px; }
.sr-item {
  background:rgba(0,0,0,.45); border:1px solid rgba(201,162,39,.3); border-radius:3px;
  padding:9px 12px; margin-top:8px; cursor:pointer;
}
.sr-item b { font-family:'IM Fell English',serif; font-weight:400; color:var(--parchment); }
.sr-item span { display:block; font-size:12.5px; color:#9A8A66; font-style:italic; }
.bookwall { padding: 8px 14px 0; }
.shelf-row { position:relative; margin-bottom: 26px; }
.books-row {
  display:flex; align-items:flex-end; justify-content:center; gap:10px;
  min-height: 196px; padding: 0 6px;
}
.shelf-board {
  height:16px; margin: 0 -14px;
  background: linear-gradient(#6B4E2E, var(--wood-mid) 40%, #241910);
  border-top:1px solid #8A6A42;
  box-shadow: 0 8px 14px rgba(0,0,0,.6);
}
.book-spine {
  position:relative;
  width:60px; height:184px;
  border-radius: 3px 6px 6px 3px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center;
  box-shadow: inset -6px 0 10px rgba(0,0,0,.45), inset 2px 0 4px rgba(255,255,255,.12), 3px 3px 8px rgba(0,0,0,.55);
  flex:0 0 auto;
}
.book-spine .band {
  width:100%; height:7px; background:linear-gradient(var(--gold), #8A6E1E);
  opacity:.85;
}
.book-spine .band.top { margin-top:12px; }
.book-spine .band.bottom { position:absolute; bottom:12px; }
.book-spine .sigil { color:var(--gold); font-size:19px; margin-top:8px; text-shadow:0 1px 2px rgba(0,0,0,.7); }
.book-spine .spine-title {
  writing-mode: vertical-rl;
  font-family:'IM Fell English', serif;
  font-size:15px; letter-spacing:.08em;
  color:#F0E2BC; text-shadow:0 1px 3px rgba(0,0,0,.8);
  margin-top:10px; max-height:112px; overflow:hidden;
}
.book-spine .count {
  position:absolute; bottom:26px; font-size:11px; color:rgba(240,226,188,.75);
}
.shelf-plaque {
  text-align:center; margin-top:-20px; position:relative; z-index:2;
}
.shelf-plaque span {
  display:inline-block; background:linear-gradient(#3E2B1A,#241910);
  border:1px solid var(--gold-dim); border-radius:2px;
  color:var(--gold); font-size:10.5px; letter-spacing:.3em; text-transform:uppercase;
  padding:3px 14px;
}

/* ---------- CUTSCENE ---------- */
#cutscene { z-index:60; background:transparent; pointer-events:none; }
#cutscene.active { pointer-events:auto; }
#cutFade { position:absolute; inset:0; background:var(--wall); opacity:0; transition:opacity .5s ease; }
#cutBook {
  position:absolute;
  transform-style:preserve-3d;
  transition: all .65s cubic-bezier(.4,.1,.2,1);
}

/* ---------- BOOK / PAGES ---------- */
#book { 
  background:
    linear-gradient(180deg, rgba(90,70,40,.22), rgba(0,0,0,0) 60px),
    radial-gradient(ellipse at 8% 50%, rgba(90,70,40,.28), transparent 22%),
    radial-gradient(ellipse at 96% 30%, rgba(120,95,55,.18), transparent 30%),
    radial-gradient(ellipse at 60% 110%, rgba(120,95,55,.22), transparent 45%),
    linear-gradient(90deg, var(--parchment-deep), var(--parchment) 8%, var(--parchment) 92%, var(--parchment-deep));
  color: var(--ink);
}
/* stacked page edges hugging the screen edges */
#book::before, #book::after { content:""; position:fixed; pointer-events:none; z-index:5; }
#book::before {
  top:0; bottom:0; right:0; width:10px;
  background:
    repeating-linear-gradient(90deg,
      rgba(120,95,55,.55) 0 1px, rgba(244,236,214,.9) 1px 2.5px);
  box-shadow: inset 6px 0 8px rgba(0,0,0,.12);
}
#book::after {
  left:0; right:0; bottom:0; height:9px;
  background:
    repeating-linear-gradient(180deg,
      rgba(120,95,55,.5) 0 1px, rgba(244,236,214,.9) 1px 2.5px);
}
.page-scroll {
  position:absolute; inset:0; overflow-y:auto;
  padding: calc(16px + env(safe-area-inset-top)) 26px calc(70px + env(safe-area-inset-bottom)) 22px;
}
.page {
  position:absolute; inset:0;
  background:
    linear-gradient(180deg, rgba(90,70,40,.22), rgba(0,0,0,0) 60px),
    radial-gradient(ellipse at 8% 50%, rgba(90,70,40,.28), transparent 22%),
    radial-gradient(ellipse at 96% 30%, rgba(120,95,55,.18), transparent 30%),
    radial-gradient(ellipse at 60% 110%, rgba(120,95,55,.22), transparent 45%),
    linear-gradient(90deg, var(--parchment-deep), var(--parchment) 8%, var(--parchment) 92%, var(--parchment-deep));
  box-shadow: -4px 0 14px rgba(0,0,0,.0);
}
.page.turning-out, .page.turning-in { box-shadow: 10px 0 30px rgba(46,36,24,.35); }
.page.turning-out { animation: turnOut .45s ease-in forwards; transform-origin:left center; z-index:8; }
.page.turning-in { animation: turnIn .45s ease-out forwards; transform-origin:left center; z-index:8; }
@keyframes turnOut { from { transform:none; filter:none; } to { transform: perspective(1200px) rotateY(-84deg); filter:brightness(.75); } }
@keyframes turnIn { from { transform: perspective(1200px) rotateY(-84deg); filter:brightness(.75); } to { transform:none; filter:none; } }

.book-topbar {
  position:fixed; top:0; left:0; right:0; z-index:10;
  display:flex; justify-content:space-between; align-items:center;
  padding: calc(8px + env(safe-area-inset-top)) 14px 6px;
  background: linear-gradient(rgba(233,223,198,.94), rgba(233,223,198,0));
}
.book-btn {
  background:none; border:none; font-family:'Crimson Pro',serif; font-size:16px;
  color:#6B4E2E; cursor:pointer; padding:6px 4px; letter-spacing:.03em;
}
.book-btn.danger { color: var(--oxblood); }
.page-head { text-align:center; margin-bottom:6px; }
.page-eyebrow { font-size:10.5px; letter-spacing:.32em; text-transform:uppercase; color:#8A7040; }
.page-sigil { font-size:26px; color:#8A6E1E; margin:2px 0; }
.page h2 {
  font-family:'IM Fell English',serif; font-weight:400; font-size:30px;
  color:var(--ink); line-height:1.15;
}
.page h2.toc-title { font-size:32px; }
.orn { text-align:center; color:#A98C4A; letter-spacing:.5em; margin:6px 0 10px; }
.page-tags { display:flex; justify-content:center; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
.ptag {
  font-size:12px; font-style:italic; color:var(--moss);
  border:1px solid rgba(94,106,60,.45); border-radius:999px; padding:1px 9px;
}
.psection { margin-top:15px; }
.psection-label {
  font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:#8A6E1E;
  display:flex; align-items:center; gap:10px; margin-bottom:4px;
}
.psection-label::after { content:""; flex:1; height:1px; background:rgba(138,110,30,.35); }
.psection p { white-space:pre-wrap; font-size:17.5px; }
.psection.warn .psection-label { color:var(--oxblood); }
.psection.warn .psection-label::after { background:rgba(140,48,48,.35); }
.psection.warn p { color:#6E2A2A; }
.toc-list { margin-top:4px; }
.toc-item {
  display:flex; align-items:baseline; gap:8px;
  font-size:18.5px; padding:7px 0; cursor:pointer;
}
.toc-item .t { font-family:'IM Fell English',serif; }
.toc-item .dots { flex:1; border-bottom:1.5px dotted rgba(90,74,52,.5); transform:translateY(-4px); }
.toc-item .pg { color:#8A7040; font-size:15px; }
.toc-empty { font-style:italic; color:var(--ink-soft); margin-top:10px; }
.inscribe-btn {
  display:block; width:100%; margin-top:22px; padding:12px;
  background:none; border:1.5px solid rgba(138,110,30,.55); border-radius:3px;
  font-family:'IM Fell English',serif; font-size:17px; color:#8A6E1E; cursor:pointer;
}
.book-footer {
  position:fixed; left:0; right:0; bottom:0; z-index:10;
  display:flex; justify-content:space-between; align-items:center;
  padding: 8px 10px calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(rgba(233,223,198,0), rgba(233,223,198,.95) 55%);
}
.pageno { font-style:italic; color:#8A7040; font-size:14px; }
.turn-btn {
  background:none; border:none; color:#6B4E2E; font-size:26px; cursor:pointer;
  padding: 2px 16px; font-family:Georgia, serif;
}
.turn-btn:disabled { opacity:.25; }

/* ---------- OVERLAYS (form + bindery, dark) ---------- */
.overlay {
  position:fixed; inset:0; z-index:80; background:var(--wall);
  overflow-y:auto; display:none;
  padding: calc(14px + env(safe-area-inset-top)) 16px calc(30px + env(safe-area-inset-bottom));
}
.overlay.open { display:block; }
.overlay-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.overlay-top .mid { font-family:'IM Fell English',serif; color:var(--gold); }
.text-btn { background:none; border:none; color:var(--gold); font-family:inherit; font-size:16px; cursor:pointer; padding:8px 4px; }
.form-field { margin-bottom:13px; }
.form-field label {
  display:block; font-size:11px; letter-spacing:.25em; text-transform:uppercase;
  color:var(--gold-dim); margin-bottom:5px;
}
.overlay input, .overlay textarea, .overlay select {
  width:100%; font-family:inherit; font-size:16px; color:var(--parchment);
  background:#221A10; border:1px solid rgba(201,162,39,.35); border-radius:3px;
  padding:10px 12px;
}
.overlay textarea { min-height:80px; resize:vertical; }
.overlay input::placeholder, .overlay textarea::placeholder { color:#6E644F; font-style:italic; }
.primary-btn {
  width:100%; padding:13px; margin-top:4px;
  background:var(--gold); color:var(--wall);
  font-family:'IM Fell English',serif; font-size:18px;
  border:none; border-radius:3px; cursor:pointer;
}
.ghost-btn {
  width:100%; padding:12px; background:#221A10; color:var(--parchment);
  border:1px solid rgba(201,162,39,.35); border-radius:3px;
  font-family:inherit; font-size:16px; cursor:pointer; margin-bottom:10px;
}
.hint { font-size:13px; font-style:italic; color:#9A8A66; margin-top:2px; }
.glyph-row { display:flex; gap:8px; flex-wrap:wrap; }
.glyph-opt {
  width:44px; height:44px; font-size:20px; background:#221A10;
  border:1px solid rgba(201,162,39,.35); border-radius:3px; color:var(--gold); cursor:pointer;
}
.glyph-opt.selected { background:var(--gold); color:var(--wall); }
.divider-orn { text-align:center; color:var(--gold-dim); margin:18px 0 10px; letter-spacing:.5em; }

/* ---------- MODAL + TOAST ---------- */
#modal {
  position:fixed; inset:0; z-index:200; display:none;
  align-items:center; justify-content:center;
  background:rgba(10,7,4,.72); padding:24px;
}
#modal.open { display:flex; }
.modal-box {
  width:100%; max-width:340px;
  background:linear-gradient(#2B2218,#221A10);
  border:1px solid rgba(201,162,39,.5); border-radius:4px;
  padding:20px 18px 16px; text-align:center; position:relative;
}
.modal-box::before { content:""; position:absolute; inset:6px; border:1px solid rgba(201,162,39,.2); border-radius:3px; pointer-events:none; }
.modal-title { font-family:'IM Fell English',serif; font-size:20px; color:var(--gold); margin-bottom:6px; }
.modal-msg { color:var(--parchment); font-size:16px; margin-bottom:16px; }
.modal-row { display:flex; gap:10px; }
.modal-row button {
  flex:1; padding:11px; border-radius:3px; font-family:'Crimson Pro',serif;
  font-size:16px; cursor:pointer;
}
.modal-cancel { background:none; border:1px solid rgba(201,162,39,.4); color:var(--parchment); }
.modal-confirm { background:var(--oxblood); border:none; color:#F0DEDE; font-family:'IM Fell English',serif; }
.modal-confirm.gold { background:var(--gold); color:var(--wall); }
#toast {
  position:fixed; left:50%; bottom:calc(30px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(20px); z-index:210;
  background:#2B2218; border:1px solid rgba(201,162,39,.55); border-radius:3px;
  color:var(--parchment); font-size:15px; padding:10px 18px;
  opacity:0; pointer-events:none; transition:opacity .3s ease, transform .3s ease;
  max-width:86vw; text-align:center;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.section-label-dark {
  font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:var(--gold);
  display:flex; align-items:center; gap:10px; margin: 6px 0 10px;
}
.section-label-dark::after { content:""; flex:1; height:1px; background:rgba(201,162,39,.35); }

@media (prefers-reduced-motion: reduce) {
  .splash-sigil, .splash-title, .splash-sub { animation-duration:.01s !important; animation-delay:0s !important; }
  .page.turning-out, .page.turning-in { animation-duration:.01s !important; }
  #cutBook, #cutBook * { transition:none !important; }
}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="scene active" id="splash">
  <div class="splash-sigil">☿</div>
  <div class="splash-title">The Apothecary Codex</div>
  <div class="splash-sub">herb &amp; garden · field &amp; flame · spirit &amp; sign</div>
</div>

<!-- SHELF -->
<div class="scene" id="shelf">
  <div class="shelf-head">
    <h1>The Library</h1>
    <div class="sub">choose a volume from the shelf</div>
  </div>
  <div class="shelf-tools">
    <input id="search" type="search" placeholder="Search all volumes…">
    <button class="tool-btn" id="settingsBtn" aria-label="Bindery">⚙</button>
  </div>
  <div id="searchResults"></div>
  <div class="bookwall" id="bookwall"></div>
</div>

<!-- CUTSCENE -->
<div class="scene" id="cutscene">
  <div id="cutFade"></div>
  <div id="cutBook"></div>
</div>

<!-- BOOK -->
<div class="scene" id="book">
  <div id="pageHost"></div>
  <div class="book-topbar">
    <button class="book-btn" id="closeBook">‹ Return the book</button>
    <span>
      <button class="book-btn" id="editEntry" style="display:none">Edit</button>
      <button class="book-btn danger" id="deleteEntry" style="display:none">Strike</button>
    </span>
  </div>
  <div class="book-footer">
    <button class="turn-btn" id="prevPage" aria-label="Previous page">❮</button>
    <span class="pageno" id="pageNo"></span>
    <button class="turn-btn" id="nextPage" aria-label="Next page">❯</button>
  </div>
</div>

<!-- FORM OVERLAY -->
<div class="overlay" id="formOverlay">
  <div class="overlay-top">
    <button class="text-btn" id="formCancel">‹ Cancel</button>
    <span class="mid" id="formTitle">New Entry</span>
    <span style="width:60px"></span>
  </div>
  <div class="form-field"><label>Name</label><input id="fName" placeholder="e.g. Yarrow"></div>
  <div class="form-field"><label>Volume</label><select id="fCategory"></select></div>
  <div class="form-field"><label>Tags</label><input id="fTags" placeholder="comma, separated, tags"></div>
  <div class="form-field"><label>Description</label><textarea id="fDesc" placeholder="What it is, how to identify it…"></textarea></div>
  <div class="form-field"><label>Uses</label><textarea id="fUses" placeholder="What it's good for…"></textarea></div>
  <div class="form-field"><label>Preparation / Method</label><textarea id="fPrep" placeholder="How to prepare or perform it…"></textarea></div>
  <div class="form-field"><label>Warnings</label><textarea id="fWarn" placeholder="Cautions, look-alikes, contraindications…"></textarea></div>
  <button class="primary-btn" id="formSave">Inscribe in the Codex</button>
</div>

<!-- BINDERY OVERLAY -->
<div class="overlay" id="settingsOverlay">
  <div class="overlay-top">
    <button class="text-btn" id="settingsBack">‹ Library</button>
    <span class="mid">Bindery</span>
    <span style="width:60px"></span>
  </div>
  <div class="section-label-dark">Backup</div>
  <button class="ghost-btn" id="exportBtn">Export codex as file</button>
  <button class="ghost-btn" id="importBtn">Import from file</button>
  <input type="file" id="importFile" accept=".json" style="display:none">
  <p class="hint">Export regularly — your codex lives only on this device until backed up. Import merges; existing entries aren't overwritten.</p>
  <div class="divider-orn">❦</div>
  <div class="section-label-dark">Bind a New Volume</div>
  <div class="form-field"><label>Name</label><input id="catName" placeholder="e.g. Supplements"></div>
  <div class="form-field"><label>Sigil</label><div class="glyph-row" id="glyphRow"></div></div>
  <button class="primary-btn" id="catSave">Add to the Shelf</button>
</div>

<!-- MODAL + TOAST -->
<div id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-row">
      <button class="modal-cancel" id="modalCancel">Cancel</button>
      <button class="modal-confirm" id="modalOk">Strike</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const LS_ENTRIES = 'apothecary.entries';
const LS_CATS = 'apothecary.categories';

const DEFAULT_CATS = [
  { id:'herbal',    name:'Herbal Medicine', glyph:'❧' },
  { id:'garden',    name:'Garden',          glyph:'❦' },
  { id:'survival',  name:'Survival',        glyph:'🜂' },
  { id:'spiritual', name:'Spiritual',       glyph:'☾' }
];
const SEED = [
  { id:'seed-chamomile', category:'herbal', title:'Chamomile', tags:['tea','calming','sleep'],
    desc:'Small daisy-like flowers with white petals and a domed yellow center. German chamomile is the common medicinal variety; grows readily in most gardens.',
    uses:'Calming tea for stress and restlessness. Traditionally used to ease mild digestive upset and support sleep.',
    prep:'Steep 1–2 tsp dried flowers in hot water, covered, for 5–10 minutes. Covering the cup keeps the aromatic oils in the tea.',
    warn:'Avoid if allergic to ragweed or other plants in the daisy family. Check with a doctor before regular use if pregnant or on blood thinners.' },
  { id:'seed-plantain', category:'herbal', title:'Plantain Leaf', tags:['first aid','poultice','foraging'],
    desc:'Common yard "weed" (Plantago major / lanceolata) — not the banana. Broad ribbed leaves in a low rosette; found in lawns and paths nearly everywhere.',
    uses:'Classic field remedy for insect bites, stings, and minor scrapes. Soothes itch and irritation.',

const LEATHERS = [
  ['#5A2E22','#3A1C14'], ['#2F4030','#1C2A1E'], ['#5A4A22','#3A2E14'],
  ['#2E3A50','#1A2334'], ['#4A2440','#2E152A'], ['#503A2A','#32241A'],
  ['#3A3A3A','#222'],    ['#6A3A1E','#402312']
];
const GLYPHS = ['✦','☿','⚕','🜁','🜃','🜄','☉','♁','❋','⚘','🕯','⚔'];
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

let entries = [], categories = [];
let currentCat = null, pageIdx = 0, editingId = null, selectedGlyph = '✦';

function load() {
  try { entries = JSON.parse(localStorage.getItem(LS_ENTRIES)) || null; } catch(e){ entries = null; }
  try { categories = JSON.parse(localStorage.getItem(LS_CATS)) || null; } catch(e){ categories = null; }
  if (!categories) { categories = DEFAULT_CATS.slice(); saveCats(); }
  if (!entries) { entries = SEED.map(s => ({...s, created:Date.now(), updated:Date.now()})); saveEntries(); }
}
const saveEntries = () => localStorage.setItem(LS_ENTRIES, JSON.stringify(entries));
const saveCats = () => localStorage.setItem(LS_CATS, JSON.stringify(categories));
const catOf = id => categories.find(c=>c.id===id) || {id, name:'Unbound', glyph:'✦'};
const catEntries = id => entries.filter(e=>e.category===id).sort((a,b)=>a.title.localeCompare(b.title));
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function show(id){ document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
const leatherFor = i => LEATHERS[i % LEATHERS.length];

function askConfirm(title, msg, okLabel) {
  return new Promise(resolve => {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMsg').textContent = msg;
    const ok = document.getElementById('modalOk');
    ok.textContent = okLabel || 'Confirm';
    const modal = document.getElementById('modal');
    modal.classList.add('open');
    const done = v => { modal.classList.remove('open'); ok.onclick = null; document.getElementById('modalCancel').onclick = null; resolve(v); };
    ok.onclick = () => done(true);
    document.getElementById('modalCancel').onclick = () => done(false);
  });
}
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ---------- SHELF ---------- */
function renderShelf() {
  const wall = document.getElementById('bookwall');
  wall.innerHTML = '';
  const perShelf = 4;
  for (let i=0; i<categories.length; i+=perShelf) {
    const row = document.createElement('div'); row.className='shelf-row';
    const books = document.createElement('div'); books.className='books-row';
    categories.slice(i, i+perShelf).forEach((c) => {
      const gi = categories.indexOf(c);
      const [l1,l2] = leatherFor(gi);
      const n = catEntries(c.id).length;
      const b = document.createElement('div');
      b.className = 'book-spine';
      b.style.background = `linear-gradient(90deg, ${l2}, ${l1} 30%, ${l1} 70%, ${l2})`;
      b.innerHTML = `<div class="band top"></div><div class="sigil">${esc(c.glyph)}</div>` +
        `<div class="spine-title">${esc(c.name)}</div>` +
        `<div class="count">${n}</div><div class="band bottom"></div>`;
      b.onclick = () => openBookCutscene(c, b);
      books.appendChild(b);
    });
    const board = document.createElement('div'); board.className='shelf-board';
    row.appendChild(books); row.appendChild(board);
    wall.appendChild(row);
  }
}

/* ---------- SEARCH ---------- */
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const box = document.getElementById('searchResults');
  box.innerHTML = '';
  if (!q) return;
  entries.filter(e => [e.title,e.desc,e.uses,e.prep,e.warn,(e.tags||[]).join(' ')].join(' ').toLowerCase().includes(q))
    .slice(0,12).forEach(e => {
      const c = catOf(e.category);
      const d = document.createElement('div'); d.className='sr-item';
      d.innerHTML = `<b>${esc(e.title)}</b><span>${esc(c.glyph)} ${esc(c.name)}</span>`;
      d.onclick = () => {
        document.getElementById('search').value=''; box.innerHTML='';
        openBookAt(c, e.id);
      };
      box.appendChild(d);
    });
});

/* ---------- CUTSCENE ---------- */
function openBookCutscene(cat, spineEl) {
  if (reducedMotion) { openBookAt(cat); return; }
  const rect = spineEl.getBoundingClientRect();
  const gi = categories.indexOf(cat);
  const [l1,l2] = leatherFor(gi);
  const fade = document.getElementById('cutFade');
  const book = document.getElementById('cutBook');
  const vw = innerWidth, vh = innerHeight;
  const coverW = Math.min(vw*0.62, 270), coverH = coverW*1.45;
  const midW = rect.width*1.35, midH = coverH;

  book.style.transition = 'none';
  book.style.left = rect.left+'px';
  book.style.top = rect.top+'px';
  book.style.width = rect.width+'px';
  book.style.height = rect.height+'px';
  book.innerHTML =
    `<div id="csSpine" style="position:absolute;inset:0;border-radius:3px 6px 6px 3px;` +
      `background:linear-gradient(90deg, ${l2}, ${l1} 30%, ${l1} 70%, ${l2});` +
      `box-shadow:inset -6px 0 10px rgba(0,0,0,.45), 4px 6px 18px rgba(0,0,0,.6);` +
      `display:flex;flex-direction:column;align-items:center;transition:opacity .4s ease">` +
      `<div style="width:100%;height:7px;background:linear-gradient(#C9A227,#8A6E1E);margin-top:12px"></div>` +
      `<div style="color:#C9A227;font-size:19px;margin-top:8px">${esc(cat.glyph)}</div>` +
      `<div style="writing-mode:vertical-rl;font-family:'IM Fell English',serif;font-size:15px;color:#F0E2BC;margin-top:10px">${esc(cat.name)}</div>` +
    `</div>` +
    `<div id="csCover" style="position:absolute;inset:0;border-radius:4px 8px 8px 4px;opacity:0;` +
      `background:linear-gradient(135deg, ${l1}, ${l2});border:2px solid rgba(201,162,39,.5);` +
      `box-shadow:0 18px 50px rgba(0,0,0,.75);` +
      `display:flex;flex-direction:column;align-items:center;justify-content:center;` +
      `transform:perspective(900px) rotateY(62deg);transform-origin:left center;` +
      `transition:opacity .4s ease, transform .45s ease">` +
      `<div style="position:absolute;inset:10px;border:1px solid rgba(201,162,39,.45);border-radius:3px"></div>` +
      `<div style="font-size:44px;color:#C9A227;text-shadow:0 2px 6px rgba(0,0,0,.6)">${esc(cat.glyph)}</div>` +
      `<div style="font-family:'IM Fell English',serif;font-size:22px;color:#F0E2BC;text-align:center;padding:0 14px;margin-top:8px">${esc(cat.name)}</div>` +
    `</div>`;
  fade.style.transition = 'opacity .5s ease';
  fade.style.opacity = 0;
  document.getElementById('cutscene').classList.add('active');

  const spine = () => document.getElementById('csSpine');
  const cover = () => document.getElementById('csCover');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    // Stage 1 (.55s): book slides off the shelf to center, room dims
    fade.style.opacity = .82;
    book.style.transition = 'left .55s cubic-bezier(.4,.1,.2,1), top .55s cubic-bezier(.4,.1,.2,1), width .55s cubic-bezier(.4,.1,.2,1), height .55s cubic-bezier(.4,.1,.2,1)';
    book.style.left = (vw-midW)/2+'px';
    book.style.top = (vh-midH)/2+'px';
    book.style.width = midW+'px';
    book.style.height = midH+'px';

    setTimeout(() => {
      // Stage 2 (.45s): book turns to face you — spine fades out as cover swings flat
      book.style.left = (vw-coverW)/2+'px';
      book.style.width = coverW+'px';
      spine().style.opacity = 0;
      cover().style.opacity = 1;
      cover().style.transform = 'perspective(900px) rotateY(0deg)';

      setTimeout(() => {
        // Stage 3 (.6s): cover swings open, fade into the pages
        cover().style.transition = 'transform .6s cubic-bezier(.5,.05,.3,1)';
        cover().style.transform = 'perspective(900px) rotateY(-150deg)';
        fade.style.opacity = 1;

        setTimeout(() => {
          openBookAt(cat);
          document.getElementById('cutscene').classList.remove('active');
          fade.style.opacity = 0;
          book.innerHTML = '';
        }, 560);
      }, 500);
    }, 600);
  }));
}

/* ---------- BOOK ---------- */
function openBookAt(cat, entryId) {
  currentCat = cat;
  const list = catEntries(cat.id);
  pageIdx = 0;
  if (entryId) {
    const i = list.findIndex(e=>e.id===entryId);
    if (i >= 0) pageIdx = i+1;
  }
  show('book');
  renderPage(false);
}

function pageCount(){ return catEntries(currentCat.id).length + 1; }

function pageHTML(idx) {
  const list = catEntries(currentCat.id);
  if (idx === 0) {
    const toc = list.length
      ? list.map((e,i) =>
          `<div class="toc-item" data-jump="${i+1}"><span class="t">${esc(e.title)}</span><span class="dots"></span><span class="pg">${i+2}</span></div>`
        ).join('')
      : '<p class="toc-empty">These pages are blank. Inscribe the first entry below.</p>';
    return `<div class="page-scroll">
      <div class="page-head">
        <div class="page-eyebrow">A Volume of the Apothecary Codex</div>
        <div class="page-sigil">${esc(currentCat.glyph)}</div>
        <h2 class="toc-title">${esc(currentCat.name)}</h2>
        <div class="orn">❦ ❦ ❦</div>
      </div>
      <div class="psection-label">Contents</div>
      <div class="toc-list">${toc}</div>
      <button class="inscribe-btn" id="tocAdd">✒ Inscribe a new entry</button>
    </div>`;
  }
  const e = list[idx-1];
  const sec = (label, text, warn) => text ?
    `<div class="psection${warn?' warn':''}"><div class="psection-label">${label}</div><p>${esc(text)}</p></div>` : '';
  return `<div class="page-scroll">
    <div class="page-head">
      <div class="page-eyebrow">${esc(currentCat.name)}</div>
      <h2>${esc(e.title)}</h2>
      ${(e.tags&&e.tags.length)?`<div class="page-tags">${e.tags.map(t=>`<span class="ptag">${esc(t)}</span>`).join('')}</div>`:''}
      <div class="orn">❦</div>
    </div>
    ${sec('Description', e.desc)}
    ${sec('Uses', e.uses)}
    ${sec('Preparation', e.prep)}
    ${sec('Warnings', e.warn, true)}
  </div>`;
}

function renderPage(animate, direction) {
  const host = document.getElementById('pageHost');
  const old = host.firstElementChild;
  const newPage = document.createElement('div');
  newPage.className = 'page';
  newPage.innerHTML = pageHTML(pageIdx);

  // Content swaps immediately — animation is purely cosmetic on top
  host.innerHTML = '';
  host.appendChild(newPage);
  wirePage(newPage);
  updateChrome();

  if (animate && old && !reducedMotion) {
    if (direction === 'next') {
      // old page lifts and turns away on top of the new one
      old.classList.add('turning-out');
      old.style.zIndex = 9;
      host.appendChild(old);
      const cleanup = () => { if (old.parentNode) old.remove(); };
      old.addEventListener('animationend', cleanup, {once:true});
      setTimeout(cleanup, 600);
    } else {
      // new page settles down into place
      newPage.classList.add('turning-in');
      newPage.style.zIndex = 9;
      const done = () => { newPage.classList.remove('turning-in'); newPage.style.zIndex=''; };
      newPage.addEventListener('animationend', done, {once:true});
      setTimeout(done, 600);
    }
  }
}

function wirePage(page) {
  page.querySelectorAll('[data-jump]').forEach(el =>
    el.addEventListener('click', () => { pageIdx = +el.dataset.jump; renderPage(true,'next'); }));
  const add = page.querySelector('#tocAdd');
  if (add) add.addEventListener('click', () => openForm(null, currentCat.id));
}

function updateChrome() {
  const total = pageCount();
  document.getElementById('pageNo').textContent =
    pageIdx === 0 ? 'Contents' : `Page ${pageIdx+1} of ${total}`;
  document.getElementById('prevPage').disabled = pageIdx <= 0;
  document.getElementById('nextPage').disabled = pageIdx >= total-1;
  const onEntry = pageIdx > 0;
  document.getElementById('editEntry').style.display = onEntry ? '' : 'none';
  document.getElementById('deleteEntry').style.display = onEntry ? '' : 'none';
}

function turn(dir) {
  const total = pageCount();
  if (dir==='next' && pageIdx < total-1) { pageIdx++; renderPage(true,'next'); }
  if (dir==='prev' && pageIdx > 0) { pageIdx--; renderPage(true,'prev'); }
}
document.getElementById('nextPage').onclick = () => turn('next');
document.getElementById('prevPage').onclick = () => turn('prev');

// swipe
let tx = null, ty = null;
document.getElementById('book').addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, {passive:true});
document.getElementById('book').addEventListener('touchend', e => {
  if (tx===null) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)*1.4) turn(dx < 0 ? 'next' : 'prev');
  tx = ty = null;
}, {passive:true});

document.getElementById('closeBook').onclick = () => { renderShelf(); show('shelf'); };
document.getElementById('editEntry').onclick = () => {
  const e = catEntries(currentCat.id)[pageIdx-1];
  if (e) openForm(e.id);
};
document.getElementById('deleteEntry').onclick = async () => {
  const e = catEntries(currentCat.id)[pageIdx-1];
  if (!e) return;
  const yes = await askConfirm('Strike this entry?', '"'+e.title+'" will be removed from the codex. This cannot be undone.', 'Strike');
  if (!yes) return;
  entries = entries.filter(x=>x.id!==e.id);
  saveEntries();
  pageIdx = Math.min(pageIdx, pageCount()-1);
  renderPage(false);
  toast('"'+e.title+'" struck from the codex.');
};

/* ---------- FORM ---------- */
function openForm(id, presetCat) {
  editingId = id || null;
  document.getElementById('formTitle').textContent = id ? 'Edit Entry' : 'New Entry';
  const sel = document.getElementById('fCategory');
  sel.innerHTML = categories.map(c=>`<option value="${esc(c.id)}">${esc(c.glyph)} ${esc(c.name)}</option>`).join('');
  const e = id ? entries.find(x=>x.id===id) : null;
  document.getElementById('fName').value = e ? e.title : '';
  sel.value = e ? e.category : (presetCat || (currentCat ? currentCat.id : categories[0].id));
  document.getElementById('fTags').value = e ? (e.tags||[]).join(', ') : '';
  document.getElementById('fDesc').value = e ? (e.desc||'') : '';
  document.getElementById('fUses').value = e ? (e.uses||'') : '';
  document.getElementById('fPrep').value = e ? (e.prep||'') : '';
  document.getElementById('fWarn').value = e ? (e.warn||'') : '';
  document.getElementById('formOverlay').classList.add('open');
}
document.getElementById('formCancel').onclick = () => document.getElementById('formOverlay').classList.remove('open');
document.getElementById('formSave').onclick = () => {
  const title = document.getElementById('fName').value.trim();
  if (!title) { document.getElementById('fName').focus(); return; }
  const data = {
    title,
    category: document.getElementById('fCategory').value,
    tags: document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    desc: document.getElementById('fDesc').value.trim(),
    uses: document.getElementById('fUses').value.trim(),
    prep: document.getElementById('fPrep').value.trim(),
    warn: document.getElementById('fWarn').value.trim(),
    updated: Date.now()
  };
  let savedId;
  if (editingId) {
    const i = entries.findIndex(x=>x.id===editingId);
    entries[i] = { ...entries[i], ...data };
    savedId = editingId;
  } else {
    savedId = 'e-'+Date.now()+'-'+Math.floor(Math.random()*1e4);
    entries.push({ id:savedId, created:Date.now(), ...data });
  }
  saveEntries();
  document.getElementById('formOverlay').classList.remove('open');
  const cat = catOf(data.category);
  openBookAt(cat, savedId);
};

/* ---------- BINDERY ---------- */
function renderGlyphRow() {
  const row = document.getElementById('glyphRow'); row.innerHTML='';
  GLYPHS.forEach(g => {
    const b = document.createElement('button');
    b.className = 'glyph-opt'+(g===selectedGlyph?' selected':'');
    b.textContent = g;
    b.onclick = () => { selectedGlyph=g; renderGlyphRow(); };
    row.appendChild(b);
  });
}
document.getElementById('settingsBtn').onclick = () => { renderGlyphRow(); document.getElementById('settingsOverlay').classList.add('open'); };
document.getElementById('settingsBack').onclick = () => document.getElementById('settingsOverlay').classList.remove('open');
document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([JSON.stringify({categories, entries}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'apothecary-codex-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').addEventListener('change', function() {
  const f = this.files[0]; this.value='';
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const data = JSON.parse(r.result);
      const haveE = new Set(entries.map(e=>e.id)), haveC = new Set(categories.map(c=>c.id));
      (data.categories||[]).forEach(c => { if (c.id && !haveC.has(c.id)) categories.push(c); });
      let added = 0;
      (data.entries||[]).forEach(e => { if (e.id && !haveE.has(e.id)) { entries.push(e); added++; } });
      saveCats(); saveEntries(); renderShelf();
      toast(added+' entries added to the codex.');
    } catch(err) { toast('That file could not be read as a codex backup.'); }
  };
  r.readAsText(f);
});
document.getElementById('catSave').onclick = () => {
  const name = document.getElementById('catName').value.trim();
  if (!name) return;
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g,'-');
  if (categories.some(c=>c.id===id)) { toast('That volume already exists.'); return; }
  categories.push({ id, name, glyph:selectedGlyph });
  saveCats();
  document.getElementById('catName').value='';
  document.getElementById('settingsOverlay').classList.remove('open');
  renderShelf();
};

/* ---------- BOOT ---------- */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
load();
renderShelf();
setTimeout(() => {
  const sp = document.getElementById('splash');
  sp.classList.add('leaving');
  setTimeout(() => { show('shelf'); }, 600);
}, reducedMotion ? 300 : 2200);
</script>
